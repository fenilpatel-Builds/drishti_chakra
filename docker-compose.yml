version: '3.9'

services:
  drishti-chakra:
    build: .
    container_name: drishti-chakra-engine
    image: drishti-chakra:latest
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      # Mount static folder so the splash video is always served
      - ./static:/app/static:ro
